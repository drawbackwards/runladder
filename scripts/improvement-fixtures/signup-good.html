<!doctype html>
<html>
<head><meta charset="utf-8"><title>signup-good</title></head>
<body style="margin:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#f5f6f8;color:#1a1a1a;">
  <div style="max-width:420px;margin:64px auto;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,0.08);padding:40px;">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:28px;">
      <div style="width:26px;height:26px;border-radius:7px;background:#4f46e5;"></div>
      <span style="font-weight:600;font-size:15px;color:#4f46e5;">Northwind</span>
    </div>
    <h1 style="font-size:26px;font-weight:700;margin:0 0 6px;letter-spacing:-0.4px;">Create your account</h1>
    <p style="font-size:15px;color:#6b7280;margin:0 0 28px;">Start your free 14-day trial. No credit card required.</p>

    <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;">Work email</label>
    <input placeholder="you@company.com" style="width:100%;box-sizing:border-box;padding:11px 13px;font-size:15px;border:1px solid #d1d5db;border-radius:9px;margin-bottom:18px;">

    <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;">Password</label>
    <input type="password" placeholder="••••••••" style="width:100%;box-sizing:border-box;padding:11px 13px;font-size:15px;border:1px solid #d1d5db;border-radius:9px;margin-bottom:6px;">
    <p style="font-size:12px;color:#9ca3af;margin:0 0 24px;">At least 8 characters.</p>

    <button style="width:100%;padding:13px;font-size:15px;font-weight:600;color:#fff;background:#4f46e5;border:none;border-radius:9px;cursor:pointer;">Create account</button>

    <p style="text-align:center;font-size:14px;color:#6b7280;margin:22px 0 0;">Already have an account? <span style="color:#4f46e5;font-weight:600;">Sign in</span></p>
  </div>
</body>
</html>
